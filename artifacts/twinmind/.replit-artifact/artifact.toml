kind = "web"
previewPath = "/"
title = "TwinMind AI"
version = "1.0.0"
id = "artifacts/twinmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18123

[services.development]
run = "pnpm --filter @workspace/twinmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/twinmind", "run", "build" ]
publicDir = "artifacts/twinmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18123"
BASE_PATH = "/"
